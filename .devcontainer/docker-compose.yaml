version: "3.8"

services:
  app:
    image: mcr.microsoft.com/devcontainers/java:21
    command: sleep infinity
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: devdb
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - ..:/workspaces:cached

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev